# =============================================================================
# docker-compose.yml — chay API CAKD Trash Classifier (CPU), tu chua trong deploy/.
# -----------------------------------------------------------------------------
# Chay NGAY TRONG thu muc deploy/ (noi co Dockerfile va model_60.pth):
#   cd deploy
#   docker compose up --build -d
# Model da duoc bake vao image (COPY trong Dockerfile) -> khong can mount volume.
# =============================================================================
services:
  cakd-api:
    build:
      context: .                      # chinh thu muc deploy/
      dockerfile: Dockerfile
    image: cakd-trash-api:cpu
    container_name: cakd-trash-api
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /models/model_60.pth
      DEVICE: cpu
      CLASS_NAMES: glass,paper,plastic
      USE_EMA: "0"                     # dat "1" de dung ban EMA neu muon
    restart: unless-stopped
